services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sboot-segu-aseg-hubin-ops
    ports:
      - "8090:8090"
    env_file:
      - .env.docker
    environment:
      SPRING_PROFILES_ACTIVE: docker
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8
      SPRING_DATA_MONGODB_DATABASE: ${SPRING_DATA_MONGODB_DATABASE}
      SPRING_DATA_MONGODB_CERTIFICATE_PATH: ${SPRING_DATA_MONGODB_CERTIFICATE_PATH}
      SPRING_DATA_MONGODB_CERTIFICATE_PWD: ${SPRING_DATA_MONGODB_CERTIFICATE_PWD}
      SPRING_DATA_MONGODB_HOST: ${SPRING_DATA_MONGODB_HOST}
      SPRING_DATA_MONGODB_WRITE_USERNAME: ${SPRING_DATA_MONGODB_WRITE_USERNAME}
      SPRING_DATA_MONGODB_READ_USERNAME: ${SPRING_DATA_MONGODB_READ_USERNAME}
      SPRING_DATA_MONGODB_WRITE_PASSWORD: ${SPRING_DATA_MONGODB_WRITE_PASSWORD}
      SPRING_DATA_MONGODB_READ_PASSWORD: ${SPRING_DATA_MONGODB_READ_PASSWORD}
      SPRING_DATA_MONGODB_REPLICA_SET: ${SPRING_DATA_MONGODB_REPLICA_SET}
      SPRING_DATA_MONGODB_MTLS: ${SPRING_DATA_MONGODB_MTLS}
      SPRING_DATA_MONGODB_AUTH_DATABASE: ${SPRING_DATA_MONGODB_AUTH_DATABASE}
      APPLICATION_RATE_LIMIT_ENABLED: ${APPLICATION_RATE_LIMIT_ENABLED}
      APPLICATION_RATE_LIMIT_REQUESTS: ${APPLICATION_RATE_LIMIT_REQUESTS}
      APPLICATION_RATE_LIMIT_WINDOW_SECONDS: ${APPLICATION_RATE_LIMIT_WINDOW_SECONDS}
      APPLICATION_OBSERVABILITY_HTTP_ENABLED: ${APPLICATION_OBSERVABILITY_HTTP_ENABLED}
      APPLICATION_OBSERVABILITY_HTTP_LOG_BODIES: ${APPLICATION_OBSERVABILITY_HTTP_LOG_BODIES}
      APPLICATION_OBSERVABILITY_HTTP_LOG_BODIES_ON_ERROR: ${APPLICATION_OBSERVABILITY_HTTP_LOG_BODIES_ON_ERROR}
      APPLICATION_OBSERVABILITY_HTTP_SUCCESS_SAMPLE_PERCENT: ${APPLICATION_OBSERVABILITY_HTTP_SUCCESS_SAMPLE_PERCENT}
      APPLICATION_OBSERVABILITY_HTTP_MAX_PAYLOAD_LENGTH: ${APPLICATION_OBSERVABILITY_HTTP_MAX_PAYLOAD_LENGTH}
    volumes:
      - ./certs:/app/certs:ro
    restart: unless-stopped